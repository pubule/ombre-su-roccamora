<!doctype html><html lang="it"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Plancia · Home</title>
<link rel="stylesheet" href="../comune.css"><link rel="stylesheet" href="../stile-plancia.css">
<style>
.testata { text-align: center; padding: 22px 0 6px; } .testata h1 { font-size: 36px; margin: 0; }
.testata .sub { color: var(--teal); font-style: italic; }
.dossier { display: grid; grid-template-columns: 120px 1fr; gap: 0; border: 1px solid var(--oro); border-radius: 12px;
  overflow: hidden; background: var(--notte2); margin-top: 14px; }
.dossier .cov { position: relative; } .dossier .cov img { width: 100%; height: 100%; min-height: 130px; object-fit: cover; display: block; }
.dossier .cor { padding: 14px; }
.dossier h2 { color: var(--oro-chiaro); margin: 0; font-size: 24px; }
.dossier .sotto { color: var(--perg-scura); font-style: italic; font-size: 14px; }
.dossier .badge { font-family: 'FellSC', serif; font-size: 12px; color: var(--oro-chiaro); border: 1px solid var(--oro); padding: 2px 8px; border-radius: 20px; }
.dossier .azioni { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
@media (min-width: 720px) { .dossier { grid-template-columns: 200px 1fr; } }
</style></head><body>
<div class="wrap">
  <div class="testata"><h1>ombre su roccamora</h1><div class="sub">la società del lume — arbitro digitale</div></div>
  <div class="nota center">mockup · direzione «plancia a 2 colonne» · <a href="../index.html">torna al confronto</a></div>
  <div id="ep"></div>
</div>
<script src="../dati.js"></script>
<script>
const { S, esc, urlArt } = MOCK;
document.getElementById('ep').innerHTML = S.episodi.map(e => `
  <div class="dossier">
    <div class="cov"><img src="${urlArt(e.cover)}" alt=""></div>
    <div class="cor">
      <div class="riga"><h2>${esc(e.titolo.toLowerCase())}</h2><span class="spazio"></span><span class="badge">${esc(e.stato)}</span></div>
      <div class="sotto">${esc(e.sotto)}</div>
      <div class="azioni">
        ${e.stato === 'in corso'
          ? '<a class="btn pieno" href="spedizione.html">continua →</a><a class="btn" href="indagine.html">indagine</a>'
          : '<a class="btn" href="indagine.html">comincia</a>'}
      </div>
    </div>
  </div>`).join('');
</script>
</body></html>
